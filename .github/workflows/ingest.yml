name: Ingest Cricsheet Data

on:
  schedule:
    # Runs every Monday at 03:00 UTC — Cricsheet updates weekly after matches
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      competition:
        description: 'Competition to ingest (leave blank for default: IPL + SMAT)'
        required: false
        type: choice
        options:
          - ''
          - IPL
          - SMAT
          - T20I
          - T20I_W
          - BBL
          - PSL
          - CPL
          - SA20

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/ingestion/requirements.txt

      - name: Run ingestion
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.competition }}" ]; then
            python scripts/ingestion/ingest.py --competition ${{ github.event.inputs.competition }}
          else
            python scripts/ingestion/ingest.py
          fi

  # After ingestion completes, rebuild and redeploy the site with fresh data
  deploy:
    needs: ingest
    uses: ./.github/workflows/deploy.yml
